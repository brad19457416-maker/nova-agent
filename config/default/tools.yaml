# 工具配置

version: "1.0.0"

# Web工具配置
web:
  # 搜索配置
  search:
    provider: duckduckgo
    timeout: 30
    max_results: 10
  
  # 抓取配置
  fetch:
    timeout: 30
    max_length: 10000
    user_agent: "Mozilla/5.0 (compatible; Nova-Agent/0.3.0)"

# 代码执行配置
code:
  # 是否启用
  enabled: true
  # 超时时间(秒)
  timeout: 30
  # 允许导入的模块
  allowed_imports:
    - os
    - sys
    - json
    - re
    - math
    - random
    - datetime
    - collections
    - itertools
    - typing