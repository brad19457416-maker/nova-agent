# LLM配置

version: "1.0.0"

# LLM客户端配置
llm:
  # 类型: mock | ollama | openclaw
  type: ollama
  
  # 模型名称
  model: qwen2.5:7b
  
  # Ollama配置
  ollama:
    base_url: http://localhost:11434
    default_options:
      temperature: 0.7
      num_predict: 2048
  
  # OpenClaw配置
  openclaw:
    base_url: http://localhost:8080
    
  # 默认生成参数
  defaults:
    temperature: 0.7
    max_tokens: 2048
    top_p: 0.9